name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to HF Spaces
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Prepare repo for Hugging Face
        run: |
          # Remove .claude worktree submodule refs if present
          git rm -r --cached .claude 2>/dev/null && git commit -m "chore: remove .claude from tree" || true

          # Prepend HF Spaces YAML frontmatter to README.md
          cat > /tmp/hf-header.txt <<'EOF'
          ---
          title: QKD Playground
          emoji: "\U0001F510"
          colorFrom: indigo
          colorTo: purple
          sdk: docker
          app_port: 7860
          pinned: false
          ---
          EOF
          sed -i 's/^          //' /tmp/hf-header.txt
          cat /tmp/hf-header.txt README.md > /tmp/README-hf.md
          mv /tmp/README-hf.md README.md
          git add README.md
          git commit -m "chore: add HF Spaces frontmatter"

          # Migrate binary files to Git LFS (required by HF Spaces)
          git lfs install
          git lfs migrate import --include="*.gif,*.gz,*.png" --everything --yes

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://huggingface.co/spaces/taoq-ai/qkd-playground || true
          git remote set-url hf https://x-access-token:${HF_TOKEN}@huggingface.co/spaces/taoq-ai/qkd-playground
          git push hf main --force
