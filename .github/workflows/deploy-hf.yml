name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to HF Spaces
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Prepare repo for Hugging Face
        run: |
          # Remove .claude worktree submodule refs if present
          git rm -r --cached .claude 2>/dev/null && git commit -m "chore: remove .claude from tree" || true

          # Inject HF Spaces frontmatter into README.md
          HF_HEADER=$(cat <<'HEADER'
          ---
          title: QKD Playground
          emoji: 🔐
          colorFrom: indigo
          colorTo: purple
          sdk: docker
          app_port: 7860
          pinned: false
          ---

          HEADER
          )
          # Remove leading spaces from heredoc
          HF_HEADER=$(echo "$HF_HEADER" | sed 's/^          //')
          echo "${HF_HEADER}$(cat README.md)" > README.md
          git add README.md
          git commit -m "chore: add HF Spaces frontmatter to README"

          # Migrate binary files to Git LFS (required by HF Spaces)
          git lfs install
          git lfs migrate import --include="*.gif,*.gz,*.png" --everything --yes

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://huggingface.co/spaces/taoq-ai/qkd-playground || true
          git remote set-url hf https://x-access-token:${HF_TOKEN}@huggingface.co/spaces/taoq-ai/qkd-playground
          git push hf main --force
