name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  validate:
    name: Validate Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

  release-backend:
    name: Release Backend to PyPI
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/qkd-playground/${{ needs.validate.outputs.version }}
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for hatch-vcs
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Build package
        run: uv build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: backend/dist/

  release-frontend:
    name: Release Frontend to npm
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/@qkd-playground/frontend/v/${{ needs.validate.outputs.version }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - run: corepack enable
      - run: yarn install --immutable
      - name: Set version from tag
        run: npm version "${{ needs.validate.outputs.version }}" --no-git-tag-version
      - run: yarn build
      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    name: Create GitHub Release
    needs: [validate, release-backend, release-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$GITHUB_REF_NAME" ]; then
            echo "body=Initial release" >> "$GITHUB_OUTPUT"
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG".."$GITHUB_REF_NAME" --no-merges)
            # Use heredoc for multiline output
            {
              echo "body<<CHANGELOG_EOF"
              echo "$CHANGELOG"
              echo "CHANGELOG_EOF"
            } >> "$GITHUB_OUTPUT"
          fi
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ needs.validate.outputs.version }}
          body: |
            ## What's Changed
            ${{ steps.changelog.outputs.body }}

            ## Packages
            - **PyPI**: [qkd-playground ${{ needs.validate.outputs.version }}](https://pypi.org/project/qkd-playground/${{ needs.validate.outputs.version }}/)
            - **npm**: [@qkd-playground/frontend ${{ needs.validate.outputs.version }}](https://www.npmjs.com/package/@qkd-playground/frontend/v/${{ needs.validate.outputs.version }})
          generate_release_notes: true
